<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MediaToolTrip 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --kawaii-grid: #ffeed9;
            --text-main: #5c4d7d;
            --text-light: #8e80ab;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fffaf5;
            background-image:
                linear-gradient(to right, var(--kawaii-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--kawaii-grid) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }

        .glass-card {
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255,255,255,.8);
            border-radius: 2.5rem;
            box-shadow: 0 10px 40px rgba(255,182,193,.15);
        }
        .filter-tag {
            background: rgba(255,255,255,.7);
            color: var(--text-light);
            border: 2px solid transparent;
            transition: all .2s ease;
        }
        .filter-tag:hover { border-color: #fbcfe8; color: #ff85a1; }
        .filter-tag-active {
            background: linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%);
            color: #5c4d7d;
            box-shadow: 0 4px 15px rgba(161,196,253,.4);
            border-color: #fff;
        }
        @keyframes float-blob {
            0%,100% { transform: translate(0,0) scale(1); }
            33%  { transform: translate(30px,-50px) scale(1.1); }
            66%  { transform: translate(-20px,20px) scale(.9); }
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float-blob 15s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { background-position: -1000px 0; }
            100% { background-position:  1000px 0; }
        }
        .shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right,#f6f7f8 4%,#edeef1 25%,#f6f7f8 36%);
            background-size: 1000px 100%;
        }
        @keyframes tilt-head {
            0%,100% { transform: rotate(0deg) scale(1); }
            50%  { transform: rotate(-10deg) scale(1.05); }
        }
        @keyframes pull-data {
            0%,100% { transform: translateY(0) scale(1); }
            25%  { transform: translateY(-5px) scale(1.02); }
            50%  { transform: translateY(5px) scale(.98); }
            75%  { transform: translateY(-3px) scale(1.01); }
        }
        .dicebear-tilt { animation: tilt-head 2.5s ease-in-out infinite; }
        .dicebear-pull  { animation: pull-data 1.5s ease-in-out infinite; }

        textarea::placeholder { color: #d8b4e2; }

        /* ── inline video player ── */
        .video-player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            max-height: 420px;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }
        .video-player-wrap video {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }
        /* landscape / horizontal video */
        .video-player-wrap.landscape {
            aspect-ratio: 16/9;
            max-height: 280px;
        }

        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .slide-in { animation: slideInBottom .3s ease-out; }

        /* Avatar fallback */
        .avatar-fallback {
            width: 48px; height: 48px;
            border-radius: .75rem;
            border: 2px solid white;
            background: linear-gradient(135deg,#a1c4fd,#c2e9fb);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #5c4d7d; font-size: .85rem;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 48px; height: 48px;
            border-radius: .75rem;
            border: 2px solid white;
            object-fit: cover;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="relative">

<div class="h-screen flex flex-col p-4 md:p-6 lg:p-8 max-w-[1600px] mx-auto overflow-hidden relative z-10">

    <!-- Blobs -->
    <div class="blob bg-pink-200/60  w-[500px] h-[500px] rounded-full top-[-10%] left-[-10%]"></div>
    <div class="blob bg-blue-200/50  w-[600px] h-[600px] rounded-full bottom-[-20%] right-[-10%]" style="animation-delay:-5s"></div>
    <div class="blob bg-purple-200/40 w-[400px] h-[400px] rounded-full top-[30%] right-[20%]"    style="animation-delay:-10s"></div>

    <!-- Header -->
    <header class="flex justify-between items-center mb-8 shrink-0 relative z-10 px-2">
        <div class="flex items-center gap-4 group cursor-pointer">
            <div class="p-3.5 bg-white/80 backdrop-blur-md rounded-[1.2rem] shadow-[0_8px_20px_rgba(255,182,193,.3)] border-2 border-white transform group-hover:-rotate-6 transition-transform duration-300">
                <i data-lucide="download-cloud" class="text-blue-400 w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-4xl font-black text-[#5c4d7d] tracking-tight">MediaTool<span class="text-[#a1c4fd]">Trip</span></h1>
                <p class="text-[11px] font-black text-[#8e80ab] uppercase tracking-[.2em] mt-0.5">Công cụ tải video tốc độ cao ⚡</p>
            </div>
        </div>
        <div id="connection-status" class="flex items-center gap-2 px-4 py-2 bg-white/80 rounded-full border-2 border-white shadow-sm">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-orange-400 animate-pulse"></div>
            <span id="status-text" class="text-xs font-black text-gray-600">Kết nối...</span>
        </div>
    </header>

    <div class="flex-1 flex flex-col lg:flex-row gap-8 min-h-0 overflow-hidden relative z-10 px-2">

        <!-- LEFT COLUMN -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Input -->
            <section class="mb-6 shrink-0">
                <div class="glass-card p-6">
                    <textarea
                        id="input-text"
                        oninput="updateLinkCount()"
                        placeholder="Dán link video TikTok, Douyin, BILIBILI... vào đây (hỗ trợ nhiều link)"
                        class="w-full h-24 p-5 text-purple-700 font-bold bg-white/40 rounded-[1.5rem] focus:outline-none resize-none custom-scroll text-lg border-2 border-white focus:border-[#a1c4fd] transition-all shadow-inner"
                    ></textarea>
                    <div class="flex justify-between items-center mt-4">
                        <div class="flex items-center gap-2 text-[#a599c2] font-black text-[11px] uppercase tracking-widest pl-2">
                            <i data-lucide="link" class="w-4 h-4"></i>
                            <span id="link-count">0 Link sẵn sàng</span>
                        </div>
                        <button
                            id="btn-parse"
                            onclick="handleParse()"
                            class="bg-[#a1c4fd] hover:bg-[#8ab4f8] text-white shadow-[0_8px_20px_rgba(161,196,253,.4)] disabled:opacity-50 disabled:cursor-not-allowed px-8 py-3.5 rounded-full font-black flex items-center gap-2 text-md transition-all"
                        >
                            <span id="btn-parse-text">Trích xuất</span>
                            <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Results -->
            <section class="flex-1 overflow-y-auto custom-scroll pr-4 pb-12">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <i data-lucide="layout-grid" class="text-blue-400 w-6 h-6"></i>
                    <h2 class="text-xl font-black text-[#5c4d7d]">Kết quả trích xuất</h2>
                    <span id="results-count" class="hidden bg-white/80 px-3 py-1 rounded-full text-xs font-black text-[#5c4d7d] border border-white shadow-sm ml-auto">0 mục</span>
                </div>
                <div id="results-container" class="space-y-6">
                    <!-- empty state -->
                    <div class="flex flex-col items-center justify-center opacity-80 py-10">
                        <div class="bg-white/50 p-4 rounded-[2.5rem] shadow-sm mb-4 border-2 border-white dicebear-tilt">
                            <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=sleep&backgroundColor=transparent" class="w-32 h-24 object-cover rounded-xl" alt="empty"/>
                        </div>
                        <h3 class="font-black text-xl text-[#5c4d7d] mb-1">Chưa có dữ liệu!</h3>
                        <p class="font-bold text-[#8e80ab] text-center text-sm">Dán link vào ô trên và nhấn <strong>Trích xuất</strong> để bắt đầu.</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- RIGHT COLUMN: history -->
        <aside class="hidden lg:flex w-[420px] flex-col shrink-0 pb-4">
            <div class="glass-card p-6 h-full flex flex-col relative overflow-hidden">
                <div class="flex items-center justify-between mb-6 relative z-10 px-1">
                    <h2 class="font-black text-[#5c4d7d] flex items-center gap-2 text-lg">
                        <i data-lucide="history" class="text-[#a1c4fd] w-5 h-5"></i>
                        Lịch sử trích xuất
                    </h2>
                    <button onclick="clearHistory()" class="text-[10px] font-black text-gray-500 hover:text-red-400 bg-white/60 px-3 py-1.5 rounded-full transition-colors uppercase border border-white">
                        Dọn dẹp 🧹
                    </button>
                </div>

                <!-- Tab filter -->
                <div class="flex gap-2 mb-6 overflow-x-auto pb-2 shrink-0 relative z-10 px-1 custom-scroll">
                    <button onclick="setTab('ALL')"      id="tab-ALL"      class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag filter-tag-active">TẤT CẢ</button>
                    <button onclick="setTab('DOUYIN')"   id="tab-DOUYIN"   class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">DOUYIN</button>
                    <button onclick="setTab('TIKTOK')"   id="tab-TIKTOK"   class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">TIKTOK</button>
                    <button onclick="setTab('BILIBILI')" id="tab-BILIBILI" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">BILIBILI</button>
                </div>

                <!-- Search -->
                <div class="relative mb-6 shrink-0 z-10 px-1">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-purple-300 w-4 h-4"></i>
                    <input
                        type="text" id="search-input" oninput="renderHistory()"
                        placeholder="Tìm kiếm tác giả, mô tả..."
                        class="w-full bg-white/60 border-2 border-white rounded-[1.2rem] py-3 pl-12 pr-4 text-xs font-bold text-[#5c4d7d] focus:outline-none focus:bg-white transition-all shadow-sm"
                    />
                </div>

                <div id="history-container" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2 mb-4 z-10 px-1">
                    <div class="py-20 text-center opacity-60">
                        <div class="bg-white/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i data-lucide="inbox" class="text-gray-400 w-6 h-6"></i>
                        </div>
                        <p class="text-[#8e80ab] text-xs font-black">Lịch sử trống!</p>
                    </div>
                </div>

                <div id="history-detail" class="hidden shrink-0 border-t-2 border-white/50 pt-5 mt-auto relative z-10"></div>
            </div>
        </aside>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
const socket = io();

const state = {
    results:           [],
    history:           JSON.parse(localStorage.getItem('mtt_history') || '[]'),
    tab:               'ALL',
    selectedHistoryId: null,
    isProcessing:      false,
};

// ═══════════════════════════════════════════════════════════════════
//  SOCKET EVENTS
// ═══════════════════════════════════════════════════════════════════
socket.on('connection_response', () => setConnectionStatus(true));
socket.on('disconnect',          () => setConnectionStatus(false));

socket.on('extraction_start', ({ total }) => {
    state.results        = [];
    state.isProcessing   = true;
    updateButtonState();
    renderResults();
});

socket.on('extraction_pending', ({ index, url, platform }) => {
    state.results[index] = { _loading: true, url, platform, index };
    renderResults();
});

socket.on('extraction_result', ({ index, result }) => {
    state.results[index] = result;
    if (!result.error) {
        // Deduplicate by original URL — remove old entry if exists, add fresh one at top
        state.history = state.history.filter(h => h.url !== result.url);
        state.history.unshift(result);
        saveHistory();
        renderHistory();
    }
    renderResults();
});

socket.on('extraction_error', ({ error }) => {
    showToast(error, 'error');
    state.isProcessing = false;
    updateButtonState();
});

socket.on('extraction_complete', () => {
    state.isProcessing = false;
    updateButtonState();
    showToast('Hoàn thành trích xuất! 🎉', 'success');
});

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function setConnectionStatus(ok) {
    document.getElementById('status-dot').className =
        ok ? 'w-3 h-3 rounded-full bg-green-400'
           : 'w-3 h-3 rounded-full bg-red-400 animate-pulse';
    document.getElementById('status-text').textContent = ok ? 'Đã kết nối' : 'Mất kết nối';
}

function saveHistory() {
    localStorage.setItem('mtt_history', JSON.stringify(state.history.slice(0, 200)));
}

function updateLinkCount() {
    const urls = (document.getElementById('input-text').value.match(/(https?:\/\/[^\s]+)/g) || []);
    document.getElementById('link-count').textContent = `${urls.length} Link sẵn sàng`;
}

function updateButtonState() {
    const btn  = document.getElementById('btn-parse');
    const span = document.getElementById('btn-parse-text');
    btn.disabled = state.isProcessing;
    span.innerHTML = state.isProcessing
        ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin inline-block mr-1"></i>Đang xử lý...`
        : 'Trích xuất';
    lucide.createIcons();
}

function handleParse() {
    const ta   = document.getElementById('input-text');
    const urls = (ta.value.match(/(https?:\/\/[^\s]+)/g) || []);
    if (!urls.length || state.isProcessing) return;
    state.isProcessing = true;
    updateButtonState();
    socket.emit('extract_urls', { urls });
    ta.value = '';
    updateLinkCount();
}

function copyToClipboard(btn, text) {
    navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 stroke-[4]"></i>`;
    btn.classList.add('bg-green-400', 'text-white');
    lucide.createIcons();
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.classList.remove('bg-green-400', 'text-white');
        lucide.createIcons();
    }, 1500);
}

function showToast(msg, type) {
    console.log(`[${type}] ${msg}`);
}

// ─── avatar element (img with fallback to initial) ────────────────
function avatarHtml(avatarUrl, authorName, cls = 'avatar-img') {
    const initial = (authorName || '?')[0].toUpperCase();
    if (avatarUrl) {
        return `<img
            src="${escHtml(avatarUrl)}"
            class="${cls}"
            onerror="this.replaceWith(makeFallbackAvatar('${escHtml(initial)}'))"
            alt="avatar"/>`;
    }
    return `<div class="avatar-fallback">${escHtml(initial)}</div>`;
}

function makeFallbackAvatar(initial) {
    const d = document.createElement('div');
    d.className = 'avatar-fallback';
    d.textContent = initial;
    return d;
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

/**
 * Trigger a real file download.
 * - Same-origin or CORS URLs: fetch blob → object URL → click <a download>
 * - Cross-origin blocked: fallback to <a download> click (browser may still open tab
 *   for some CDN URLs — that is a browser security limitation, not fixable in JS).
 */
async function triggerDownload(url, filename) {
    if (!url) return;
    filename = filename || url.split('/').pop().split('?')[0] || 'video.mp4';
    try {
        const res  = await fetch(url, { mode: 'cors' });
        const blob = await res.blob();
        const burl = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = burl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(burl), 10000);
    } catch (_) {
        // CORS blocked — best-effort with <a download>
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        a.target   = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

// ─── link row ─────────────────────────────────────────────────────
function linkRow(label, value) {
    if (!value) return '';
    const safe = escHtml(value);
    return `
    <div class="flex items-center justify-between bg-white/70 p-2.5 rounded-2xl border-2 border-white shadow-sm hover:border-blue-100 transition-colors">
        <div class="flex flex-col min-w-0 flex-1 pl-2">
            <span class="text-[8px] font-black text-[#a1c4fd] uppercase tracking-[.2em]">${label}</span>
            <a href="${safe}" target="_blank" class="text-[12px] font-bold text-[#5c4d7d] truncate mt-0.5">${safe}</a>
        </div>
        <button onclick="copyToClipboard(this,'${safe}')"
                class="p-2.5 rounded-xl border-2 bg-white border-transparent text-[#8e80ab] hover:bg-blue-50 hover:text-blue-400 shadow-sm transition-all ml-2 shrink-0">
            <i data-lucide="copy" class="w-4 h-4 stroke-[3]"></i>
        </button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER RESULTS
// ═══════════════════════════════════════════════════════════════════
function renderResults() {
    const container  = document.getElementById('results-container');
    const countLabel = document.getElementById('results-count');

    if (!state.results.length) {
        countLabel.classList.add('hidden');
        container.innerHTML = `
        <div class="flex flex-col items-center justify-center opacity-80 py-10">
            <div class="bg-white/50 p-4 rounded-[2.5rem] shadow-sm mb-4 border-2 border-white dicebear-tilt">
                <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=sleep&backgroundColor=transparent" class="w-32 h-24 object-cover rounded-xl" alt="empty"/>
            </div>
            <h3 class="font-black text-xl text-[#5c4d7d] mb-1">Chưa có dữ liệu!</h3>
            <p class="font-bold text-[#8e80ab] text-center text-sm">Dán link vào ô trên và nhấn <strong>Trích xuất</strong> để bắt đầu.</p>
        </div>`;
        return;
    }

    countLabel.classList.remove('hidden');
    countLabel.textContent = `${state.results.length} mục`;

    container.innerHTML = state.results.map(item => {
        if (item._loading) return loadingPanel(item);
        if (item.error)    return errorPanel(item);
        return resultPanel(item);
    }).join('');

    lucide.createIcons();
}

function loadingPanel(item) {
    return `
    <div class="glass-card p-5 border-2 border-white slide-in">
        <div class="flex flex-col md:flex-row gap-6 items-center md:items-start opacity-90">
            <div class="w-full md:w-52 aspect-square rounded-[2rem] bg-white flex flex-col items-center justify-center shrink-0 border-4 border-blue-50 shadow-sm overflow-hidden relative dicebear-pull">
                <img src="https://i.makeagif.com/media/6-12-2024/BeHxUX.gif" class="w-full h-full object-cover opacity-90" alt="loading"/>
                <div class="absolute bottom-2 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-xl border border-gray-100 shadow-sm">
                    <p class="font-black text-[#a1c4fd] text-[10px] uppercase tracking-widest flex items-center gap-1">
                        <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> Đang kéo dữ liệu...
                    </p>
                </div>
            </div>
            <div class="flex-1 w-full space-y-5 py-2">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full shimmer border-2 border-white"></div>
                    <div class="space-y-2">
                        <div class="h-4 w-32 shimmer rounded-full"></div>
                        <div class="h-3 w-20 shimmer rounded-full"></div>
                    </div>
                </div>
                <div class="space-y-2.5">
                    <div class="h-3 w-full shimmer rounded-full"></div>
                    <div class="h-3 w-5/6 shimmer rounded-full"></div>
                </div>
                <div class="bg-white/60 p-3 rounded-2xl flex items-center gap-3 border border-white">
                    <i data-lucide="link" class="text-blue-400 w-3 h-3 shrink-0"></i>
                    <p class="text-[11px] font-bold text-[#8e80ab] truncate">${escHtml(item.url)}</p>
                </div>
                <div class="w-full bg-blue-100 rounded-full h-2">
                    <div class="bg-[#a1c4fd] h-2 rounded-full w-1/3 animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>`;
}

function errorPanel(item) {
    return `
    <div class="glass-card p-5 border-2 border-red-200 bg-red-50/40 slide-in">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-red-100 rounded-full shrink-0">
                <i data-lucide="alert-circle" class="text-red-500 w-6 h-6"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-black text-red-600 text-sm">Lỗi trích xuất</p>
                <p class="text-[11px] text-red-500 mt-1 break-words">${escHtml(item.error || 'Lỗi không xác định')}</p>
                <p class="text-[10px] text-gray-500 mt-2 truncate">${escHtml(item.url || '')}</p>
            </div>
        </div>
    </div>`;
}

function resultPanel(item) {
    const desc        = item.description || '';
    const isLong      = desc.length > 100;
    const descId      = `desc-${item.id}`;
    const profileUrl  = item.authorProfileUrl || '#';
    const originalUrl = item.url || '';
    const videoUrl    = item.links?.video    || '';
    const downloadUrl = item.links?.download || videoUrl;
    const canDownload = !!downloadUrl;
    const isVideo     = item.type !== 'image';

    // ── left media panel ─────────────────────────────────────────────
    // For video: inline <video> player. For image: thumbnail img.
    let mediaHtml;
    if (isVideo && videoUrl) {
        mediaHtml = `<div class="video-player-wrap">
    <video
        controls
        preload="metadata"
        playsinline
        poster="${escHtml(item.thumbnail || '')}"
        style="border-radius:1.5rem; width:100%; display:block;"
    >
        <!-- Thẻ source để chỉ định đường dẫn video -->
        <source src="${escHtml(videoUrl)}" type="video/mp4">
        
        <!-- Nội dung hiển thị nếu trình duyệt không hỗ trợ thẻ video hoặc lỗi -->
        <div class="video-fallback">
            <img src="${escHtml(item.thumbnail || '')}" alt="Video thumbnail" style="border-radius:1.5rem; width:100%;">
            <p>Trình duyệt của bạn không hỗ trợ xem video này. <a href="${escHtml(videoUrl)}">Tải video tại đây</a>.</p>
        </div>
    </video>
</div>`;
    } else {
        const thumbSrc = item.thumbnail || '';
        mediaHtml = `
        <div class="w-full xl:w-60 aspect-square rounded-[2rem] overflow-hidden relative shadow-[0_8px_20px_rgba(0,0,0,.06)] shrink-0 bg-white border-4 border-white group-hover:shadow-[0_8px_30px_rgba(161,196,253,.3)] transition-all">
            ${thumbSrc
                ? `<img src="${escHtml(thumbSrc)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out" onerror="this.style.display='none'" alt="thumbnail"/>`
                : `<div class="w-full h-full bg-gradient-to-br from-blue-100 to-purple-100 flex items-center justify-center"><i data-lucide="image" class="text-gray-400 w-12 h-12"></i></div>`}
            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md text-[#5c4d7d] text-[9px] px-3 py-1.5 rounded-xl font-black tracking-[.15em] uppercase shadow-sm">
                ${escHtml(item.platform)}
            </div>
        </div>`;
    }

    return `
    <div class="glass-card p-6 md:p-7 flex flex-col xl:flex-row gap-8 relative group hover:border-blue-100 transition-colors slide-in">

        <!-- Media (video player or image thumb) -->
        <div class="xl:w-64 shrink-0 flex flex-col gap-3">
            ${isVideo && videoUrl ? `
            <div class="flex items-center gap-2 px-1">
                <span class="bg-white/90 backdrop-blur-md text-[#5c4d7d] text-[9px] px-3 py-1.5 rounded-xl font-black tracking-[.15em] uppercase shadow-sm">${escHtml(item.platform)}</span>
                <span class="text-[9px] font-black text-[#a1c4fd] uppercase tracking-widest">● Video</span>
            </div>` : ''}
            ${mediaHtml}
        </div>

        <!-- Info -->
        <div class="flex-1 min-w-0 space-y-4 flex flex-col justify-center">

            <!-- Author row (no timestamp) -->
            <div class="flex items-start gap-3">
                ${avatarHtml(item.avatar, item.author)}
                <div class="min-w-0">
                    <div class="flex items-center gap-1.5">
                        <h3 class="font-black text-lg text-[#5c4d7d] truncate">@${escHtml(item.author || 'unknown')}</h3>
                        <i data-lucide="check-circle-2" class="text-blue-400 w-4 h-4 shrink-0"></i>
                    </div>
                    ${profileUrl !== '#' ? `
                    <a href="${escHtml(profileUrl)}" target="_blank" rel="noopener"
                       class="text-[9px] font-black text-gray-500 hover:text-blue-400 transition-colors flex items-center gap-1 uppercase tracking-widest mt-0.5">
                        <i data-lucide="user" class="w-3 h-3"></i> Xem trang cá nhân
                    </a>` : ''}
                </div>
            </div>

            <!-- Description -->
            <div class="bg-white/50 p-4 rounded-[1.5rem]">
                <p class="text-[13px] font-bold text-[#5c4d7d] leading-relaxed ${isLong ? 'line-clamp-2' : ''}" id="${descId}">${escHtml(desc)}</p>
                ${isLong ? `
                <button onclick="toggleDesc('${descId}', this)"
                        class="text-blue-400 text-[10px] font-black mt-2 flex items-center gap-1 hover:text-[#5c4d7d] transition-colors uppercase tracking-widest">
                    Đọc thêm <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                </button>` : ''}
            </div>

            <!-- URLs -->
            <div class="space-y-2">
                ${linkRow('VIDEO URL', originalUrl)}
                ${videoUrl ? linkRow('STREAM URL', videoUrl) : ''}
                ${downloadUrl && downloadUrl !== videoUrl ? linkRow('DOWNLOAD URL', downloadUrl) : ''}
            </div>

            <!-- Download button -->
            ${canDownload ? `
            <button onclick="triggerDownload('${escHtml(downloadUrl)}')"
                    class="w-full bg-[#a1c4fd] hover:bg-[#8ab4f8] py-4 rounded-full font-black text-sm text-white shadow-md flex items-center justify-center gap-2 uppercase tracking-widest transition-all hover:-translate-y-0.5 active:scale-95">
                <i data-lucide="download" class="w-4 h-4 stroke-[3]"></i> Tải Video
            </button>` : `
            <div class="w-full bg-gray-100 py-4 rounded-full text-center text-sm font-black text-gray-400 uppercase tracking-widest">
                Không có link tải
            </div>`}
        </div>
    </div>`;
}

function toggleDesc(id, btn) {
    const el = document.getElementById(id);
    const collapsed = el.classList.toggle('line-clamp-2');
    btn.innerHTML = collapsed
        ? `Đọc thêm <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>`
        : `Thu gọn <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>`;
    lucide.createIcons();
}

// ═══════════════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════════════
function setTab(name) {
    state.tab = name;
    state.selectedHistoryId = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('filter-tag-active'));
    document.getElementById(`tab-${name}`).classList.add('filter-tag-active');
    renderHistory();
    renderDetail();
}

function clearHistory() {
    if (!confirm('Xóa toàn bộ lịch sử?')) return;
    state.history = [];
    state.selectedHistoryId = null;
    saveHistory();
    renderHistory();
    renderDetail();
}

function selectHistory(id) {
    state.selectedHistoryId = (state.selectedHistoryId === id) ? null : id;
    renderHistory();
    renderDetail();
}

function renderHistory() {
    const container = document.getElementById('history-container');
    const q = document.getElementById('search-input').value.toLowerCase();

    const filtered = state.history.filter(h => {
        const matchTab    = state.tab === 'ALL' || h.platform === state.tab;
        const matchSearch = (h.author || '').toLowerCase().includes(q)
                         || (h.description || '').toLowerCase().includes(q);
        return matchTab && matchSearch;
    });

    if (!filtered.length) {
        container.innerHTML = `
        <div class="py-20 text-center opacity-60">
            <div class="bg-white/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <i data-lucide="inbox" class="text-gray-400 w-6 h-6"></i>
            </div>
            <p class="text-[#8e80ab] text-xs font-black">Lịch sử trống!</p>
        </div>`;
        lucide.createIcons();
        return;
    }

    container.innerHTML = filtered.map(h => {
        const active = state.selectedHistoryId === h.id
            ? 'border-[#a1c4fd] shadow-[0_4px_15px_rgba(161,196,253,.3)] bg-white'
            : 'border-transparent hover:border-white shadow-sm bg-white/70 hover:bg-white';
        return `
        <div onclick="selectHistory('${escHtml(h.id)}')"
             class="${active} p-3.5 rounded-[1.5rem] flex items-center gap-3 border-2 transition-all cursor-pointer group">
            ${h.thumbnail
                ? `<img src="${escHtml(h.thumbnail)}" class="w-12 h-12 rounded-[1rem] object-cover shrink-0 shadow-sm" onerror="this.style.display='none'" alt="thumb"/>`
                : `<div class="avatar-fallback w-12 h-12 rounded-[1rem] text-xs">${escHtml((h.author||'?')[0].toUpperCase())}</div>`}
            <div class="flex-1 min-w-0">
                <p class="text-[11px] font-black text-[#5c4d7d] truncate">@${escHtml(h.author || 'unknown')}</p>
                <p class="text-[10px] text-[#8e80ab] line-clamp-1 font-bold mt-1 leading-tight">${escHtml(h.description || '')}</p>
            </div>
            <div class="flex flex-col items-end gap-1.5 shrink-0 pl-1">
                <span class="text-[8px] font-black bg-gradient-to-r from-blue-50 to-purple-50 border border-white text-purple-500 px-2 py-0.5 rounded-full uppercase">${escHtml(h.platform)}</span>
                <span class="text-[9px] text-gray-400 font-black">${escHtml(h.timestamp || '')}</span>
            </div>
        </div>`;
    }).join('');
    lucide.createIcons();
}

function renderDetail() {
    const panel = document.getElementById('history-detail');
    const item  = state.history.find(h => h.id === state.selectedHistoryId);
    if (!item) { panel.classList.add('hidden'); return; }

    const downloadUrl = item.links?.download || item.links?.video || '';
    panel.classList.remove('hidden');
    panel.innerHTML = `
    <div class="flex items-center justify-between mb-4 px-1">
        <span class="text-[10px] font-black text-[#a1c4fd] uppercase tracking-widest flex items-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5"></i> Chi tiết
        </span>
        <button onclick="selectHistory(null)" class="p-1.5 bg-white/60 text-gray-400 hover:text-red-400 rounded-full transition-colors hover:bg-white">
            <i data-lucide="x" class="w-3.5 h-3.5 stroke-[3]"></i>
        </button>
    </div>
    <div class="bg-white/80 rounded-[1.5rem] p-4 shadow-sm border-2 border-white overflow-hidden">
        <div class="flex gap-4 mb-4">
            ${item.thumbnail
                ? `<img src="${escHtml(item.thumbnail)}" class="w-20 h-20 rounded-2xl object-cover shrink-0 shadow-sm" alt="thumb"/>`
                : `<div class="avatar-fallback w-20 h-20 rounded-2xl text-lg">${escHtml((item.author||'?')[0].toUpperCase())}</div>`}
            <div class="flex-1 flex flex-col justify-center min-w-0">
                <div class="flex items-center gap-1.5 mb-1">
                    <h4 class="font-black text-xs text-[#5c4d7d] truncate">@${escHtml(item.author || 'unknown')}</h4>
                    <i data-lucide="check-circle-2" class="text-blue-400 w-3 h-3 shrink-0"></i>
                </div>
                <p class="text-[10px] text-[#8e80ab] line-clamp-3 mt-1 leading-relaxed font-bold bg-gray-50/50 rounded-xl p-1.5">${escHtml(item.description || '')}</p>
            </div>
        </div>
        ${downloadUrl ? `
        <div class="space-y-2 mb-4">
            ${linkRow('DOWNLOAD', downloadUrl)}
        </div>
        <button onclick="triggerDownload('${escHtml(downloadUrl)}')"
                class="w-full bg-[#a1c4fd] hover:bg-[#8ab4f8] text-white py-3 rounded-xl font-black text-[11px] flex items-center justify-center gap-2 uppercase tracking-widest transition-colors shadow-[0_4px_10px_rgba(161,196,253,.4)] hover:-translate-y-0.5 active:scale-95">
            <i data-lucide="download" class="w-3.5 h-3.5"></i> Tải Xuống
        </button>` : '<p class="text-xs text-gray-400 text-center font-bold">Không có link tải</p>'}
    </div>`;
    lucide.createIcons();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
lucide.createIcons();
renderHistory();
</script>
</body>
</html>
