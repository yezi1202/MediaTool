<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MediaToolTrip 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --kawaii-grid: #ffeed9;
            --text-main: #5c4d7d;
            --text-light: #8e80ab;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; }

        html {
            height: 100%;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fffaf5;
            background-image:
                linear-gradient(to right, var(--kawaii-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--kawaii-grid) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main);
            /* Mobile/portrait: natural scroll */
            min-height: 100%;
            overflow-y: auto;
        }

        /* Desktop landscape: lock to viewport height, no body scroll */
        @media (min-width: 1024px) and (orientation: landscape) {
            body {
                height: 100vh;
                overflow: hidden;
            }
            .app-root {
                height: 100vh !important;
                overflow: hidden !important;
            }
            .main-layout {
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }
            .results-scroll {
                flex: 1;
                overflow-y: auto;
                min-height: 0;
            }
            .history-scroll {
                flex: 1;
                overflow-y: auto;
                min-height: 0;
            }
        }

        /* Mobile / portrait: full scroll, no fixed heights */
        @media not ((min-width: 1024px) and (orientation: landscape)) {
            .app-root {
                height: auto !important;
                overflow: visible !important;
            }
            .main-layout {
                flex-direction: column !important;
                overflow: visible !important;
                min-height: unset !important;
            }
            .results-scroll {
                overflow: visible !important;
                max-height: none !important;
                flex: none !important;
            }
            .history-col {
                width: 100% !important;
                max-width: 100% !important;
                display: flex !important;
            }
            .history-scroll {
                max-height: 60vh;
                overflow-y: auto !important;
            }
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }

        .glass-card {
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255,255,255,.8);
            border-radius: 2.5rem;
            box-shadow: 0 10px 40px rgba(255,182,193,.15);
        }
        .filter-tag {
            background: rgba(255,255,255,.7);
            color: var(--text-light);
            border: 2px solid transparent;
            transition: all .2s ease;
        }
        .filter-tag:hover { border-color: #fbcfe8; color: #ff85a1; }
        .filter-tag-active {
            background: linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%);
            color: #5c4d7d;
            box-shadow: 0 4px 15px rgba(161,196,253,.4);
            border-color: #fff;
        }
        @keyframes float-blob {
            0%,100% { transform: translate(0,0) scale(1); }
            33%  { transform: translate(30px,-50px) scale(1.1); }
            66%  { transform: translate(-20px,20px) scale(.9); }
        }
        .blob {
            position: fixed;
            filter: blur(80px);
            z-index: 0;
            animation: float-blob 15s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0%   { background-position: -1000px 0; }
            100% { background-position:  1000px 0; }
        }
        .shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right,#f6f7f8 4%,#edeef1 25%,#f6f7f8 36%);
            background-size: 1000px 100%;
        }
        @keyframes tilt-head {
            0%,100% { transform: rotate(0deg) scale(1); }
            50%  { transform: rotate(-10deg) scale(1.05); }
        }
        @keyframes pull-data {
            0%,100% { transform: translateY(0) scale(1); }
            25%  { transform: translateY(-5px) scale(1.02); }
            50%  { transform: translateY(5px) scale(.98); }
            75%  { transform: translateY(-3px) scale(1.01); }
        }
        .dicebear-tilt { animation: tilt-head 2.5s ease-in-out infinite; }
        .dicebear-pull  { animation: pull-data 1.5s ease-in-out infinite; }

        textarea::placeholder { color: #d8b4e2; }

        /* ── inline video player ── */
        .video-player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            max-height: 420px;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }
        .video-player-wrap video {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        /* ── Image gallery ── */
        .img-main-viewer {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            max-height: 380px;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #1a1a2e;
            flex-shrink: 0;
        }
        .img-main-viewer img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            transition: opacity .25s ease;
        }
        .img-download-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s ease;
            background: rgba(0,0,0,.35);
            border-radius: 1.5rem;
        }
        .img-main-viewer:hover .img-download-overlay { opacity: 1; }

        .img-thumb-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .img-thumb-list::-webkit-scrollbar { height: 4px; }
        .img-thumb-list::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }

        .img-thumb {
            width: 56px;
            height: 56px;
            border-radius: .75rem;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            transition: border-color .2s, transform .2s;
        }
        .img-thumb:hover { transform: scale(1.05); }
        .img-thumb.active { border-color: #a1c4fd; box-shadow: 0 2px 10px rgba(161,196,253,.5); }

        .img-counter {
            position: absolute;
            bottom: 10px;
            right: 12px;
            background: rgba(0,0,0,.55);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .slide-in { animation: slideInBottom .3s ease-out; }

        .avatar-fallback {
            width: 48px; height: 48px;
            border-radius: .75rem;
            border: 2px solid white;
            background: linear-gradient(135deg,#a1c4fd,#c2e9fb);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #5c4d7d; font-size: .85rem;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 48px; height: 48px;
            border-radius: .75rem;
            border: 2px solid white;
            object-fit: cover;
            flex-shrink: 0;
        }
    </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
const state = {
    results:           [],
    history:           JSON.parse(localStorage.getItem('mtt_history') || '[]'),
    tab:               'ALL',
    selectedHistoryId: null,
    isProcessing:      false,
};

// ═══════════════════════════════════════════════════════════════════
//  NATIVE WEBSOCKET — auto-reconnect
// ═══════════════════════════════════════════════════════════════════
let ws       = null;
let wsReady  = false;
let wsRetry  = 0;
const WS_MAX_RETRY = 10;

function wsConnect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
        wsReady = true;
        wsRetry = 0;
        // setConnectionStatus(true);
        // keepalive ping every 20 s
        ws._pingInterval = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ event: 'ping' }));
        }, 20000);
    };

    ws.onclose = () => {
        wsReady = false;
        clearInterval(ws._pingInterval);
        // setConnectionStatus(false);
        if (wsRetry < WS_MAX_RETRY) {
            const delay = Math.min(1000 * 2 ** wsRetry, 15000);
            wsRetry++;
            setTimeout(wsConnect, delay);
        }
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        const { event, ...data } = msg;

        if (event === 'pong') return;

        if (event === 'extraction_start') {
            state.results      = [];
            state.isProcessing = true;
            updateButtonState();
            renderResults();
        } else if (event === 'extraction_pending') {
            state.results[data.index] = { _loading: true, url: data.url, platform: data.platform, index: data.index };
            renderResults();
        } else if (event === 'extraction_result') {
            state.results[data.index] = data.result;
            if (!data.result.error) {
                state.history = state.history.filter(h => h.url !== data.result.url);
                state.history.unshift(data.result);
                saveHistory();
                renderHistory();
            }
            renderResults();
        } else if (event === 'extraction_error') {
            showToast(data.error, 'error');
            state.isProcessing = false;
            updateButtonState();
        } else if (event === 'extraction_complete') {
            state.isProcessing = false;
            updateButtonState();
            showToast('Hoàn thành trích xuất! 🎉', 'success');
        }
    };
}

wsConnect();

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
// function setConnectionStatus(ok) {
//     document.getElementById('status-dot').className =
//         ok ? 'w-3 h-3 rounded-full bg-green-400'
//            : 'w-3 h-3 rounded-full bg-red-400 animate-pulse';
//     document.getElementById('status-text').textContent = ok ? 'Đã kết nối' : 'Mất kết nối';
// }

function saveHistory() {
    localStorage.setItem('mtt_history', JSON.stringify(state.history.slice(0, 200)));
}

function updateLinkCount() {
    const urls = (document.getElementById('input-text').value.match(/(https?:\/\/[^\s]+)/g) || []);
    document.getElementById('link-count').textContent = `${urls.length} Link sẵn sàng`;
}

function updateButtonState() {
    const btn  = document.getElementById('btn-parse');
    const span = document.getElementById('btn-parse-text');
    btn.disabled = state.isProcessing;
    span.innerHTML = state.isProcessing
        ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin inline-block mr-1"></i>Đang xử lý...`
        : 'Trích xuất';
    lucide.createIcons();
}

function handleParse() {
    const ta   = document.getElementById('input-text');
    const urls = (ta.value.match(/(https?:\/\/[^\s]+)/g) || []);
    if (!urls.length || state.isProcessing) return;
    if (!wsReady) { showToast('Chưa kết nối server', 'error'); return; }
    state.isProcessing = true;
    updateButtonState();
    ws.send(JSON.stringify({ event: 'extract_urls', urls }));
    ta.value = '';
    updateLinkCount();
}

function copyToClipboard(btn, text) {
    navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 stroke-[4]"></i>`;
    btn.classList.add('bg-green-400', 'text-white');
    lucide.createIcons();
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.classList.remove('bg-green-400', 'text-white');
        lucide.createIcons();
    }, 1500);
}

function showToast(msg, type) {
    console.log(`[${type}] ${msg}`);
}

function avatarHtml(avatarUrl, authorName, cls = 'avatar-img') {
    const initial = (authorName || '?')[0].toUpperCase();
    if (avatarUrl) {
        return `<img
            src="${escHtml(avatarUrl)}"
            class="${cls}"
            onerror="this.replaceWith(makeFallbackAvatar('${escHtml(initial)}'))"
            alt="avatar"/>`;
    }
    return `<div class="avatar-fallback">${escHtml(initial)}</div>`;
}

function makeFallbackAvatar(initial) {
    const d = document.createElement('div');
    d.className = 'avatar-fallback';
    d.textContent = initial;
    return d;
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

/**
 * Toggle play/pause for a gallery's audio element.
 * Pauses any other playing audio first (only one plays at a time).
 * @param {string} galleryId
 */
function toggleAudio(galleryId) {
    const audio  = document.getElementById(`${galleryId}-audio`);
    const btn    = document.getElementById(`${galleryId}-playbtn`);
    if (!audio || !btn) return;

    // Pause all other audio elements on the page
    document.querySelectorAll('audio').forEach(a => {
        if (a !== audio && !a.paused) {
            a.pause();
            // Reset sibling play button icon
            const sibId = a.id.replace('-audio', '-playbtn');
            const sib   = document.getElementById(sibId);
            if (sib) {
                sib.innerHTML = '<i data-lucide="play" class="w-4 h-4 stroke-[2.5]"></i>';
                lucide.createIcons({ nodes: [sib] });
            }
        }
    });

    if (audio.paused) {
        audio.play();
        btn.innerHTML = '<i data-lucide="pause" class="w-4 h-4 stroke-[2.5]"></i>';
    } else {
        audio.pause();
        btn.innerHTML = '<i data-lucide="play" class="w-4 h-4 stroke-[2.5]"></i>';
    }
    lucide.createIcons({ nodes: [btn] });

    // Reset icon when audio ends naturally
    audio.onended = () => {
        btn.innerHTML = '<i data-lucide="play" class="w-4 h-4 stroke-[2.5]"></i>';
        lucide.createIcons({ nodes: [btn] });
    };
}

async function triggerDownload(url, filename) {
    if (!url) return;
    filename = filename || url.split('/').pop().split('?')[0] || 'media.mp4';
    try {
        const res  = await fetch(url, { mode: 'cors' });
        const blob = await res.blob();
        const burl = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = burl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(burl), 10000);
    } catch (_) {
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        a.target   = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

/**
 * Download all images in a list sequentially with a small delay.
 * @param {string[]} urls - Array of image URLs
 * @param {string} prefix - Filename prefix (e.g. author name)
 */
async function downloadAllImages(urls, prefix) {
    if (!urls || !urls.length) return;
    for (let i = 0; i < urls.length; i++) {
        await triggerDownload(urls[i], `${prefix || 'image'}_${i + 1}.jpg`);
        await new Promise(r => setTimeout(r, 400));
    }
}

/**
 * Switch the main image viewer to a specific index.
 * @param {string} galleryId - DOM id prefix for this gallery
 * @param {number} idx - Index of image to show
 * @param {number} total - Total number of images
 */
function selectImage(galleryId, idx, total) {
    const mainImg   = document.getElementById(`${galleryId}-main`);
    const counter   = document.getElementById(`${galleryId}-counter`);
    const dlBtn     = document.getElementById(`${galleryId}-dl-single`);
    const thumbs    = document.querySelectorAll(`.${galleryId}-thumb`);
    const urls      = window[`${galleryId}_urls`];

    if (!urls || !urls[idx]) return;

    mainImg.style.opacity = '0';
    setTimeout(() => {
        mainImg.src = urls[idx];
        mainImg.style.opacity = '1';
    }, 150);

    if (counter) counter.textContent = `${idx + 1} / ${total}`;
    if (dlBtn)   dlBtn.setAttribute('data-url', urls[idx]);

    thumbs.forEach((t, i) => {
        t.classList.toggle('active', i === idx);
    });

    // Store current index on element for prev/next
    if (mainImg) mainImg.setAttribute('data-idx', idx);
}

function linkRow(label, value) {
    if (!value) return '';
    const safe = escHtml(value);
    return `
    <div class="flex items-center justify-between bg-white/70 p-2.5 rounded-2xl border-2 border-white shadow-sm hover:border-blue-100 transition-colors">
        <div class="flex flex-col min-w-0 flex-1 pl-2">
            <span class="text-[8px] font-black text-[#a1c4fd] uppercase tracking-[.2em]">${label}</span>
            <a href="${safe}" target="_blank" class="text-[12px] font-bold text-[#5c4d7d] truncate mt-0.5">${safe}</a>
        </div>
        <button onclick="copyToClipboard(this,'${safe}')"
                class="p-2.5 rounded-xl border-2 bg-white border-transparent text-[#8e80ab] hover:bg-blue-50 hover:text-blue-400 shadow-sm transition-all ml-2 shrink-0">
            <i data-lucide="copy" class="w-4 h-4 stroke-[3]"></i>

}

// After rendering, register gallery URL arrays in window scope
function initGalleries() {
    document.querySelectorAll('[data-gallery-init]').forEach(el => {
        const gid  = el.getAttribute('data-gallery-init');
        const raw  = el.getAttribute('data-gallery-urls');
        try {
            window[`${gid}_urls`] = JSON.parse(raw);
        } catch (_) {}
    });
}

function toggleDesc(id, btn) {
    const el = document.getElementById(id);
    const collapsed = el.classList.toggle('line-clamp-2');
    btn.innerHTML = collapsed
        ? `Đọc thêm <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>`
        : `Thu gọn <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>`;
    lucide.createIcons();
}

// Patch renderResults to also init galleries after DOM update
const _origRenderResults = renderResults;
// Override to call initGalleries after each render
(function patchRender() {
    const origRender = window.renderResults;
    window.renderResults = function() {
        origRender();
        requestAnimationFrame(() => {
            initGalleries();
            lucide.createIcons();
        });
    };
})();

// ═══════════════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════════════
function setTab(name) {
    state.tab = name;
    state.selectedHistoryId = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('filter-tag-active'));
    document.getElementById(`tab-${name}`).classList.add('filter-tag-active');
    renderHistory();
    renderDetail();
}

function clearHistory() {
    if (!confirm('Xóa toàn bộ lịch sử?')) return;
    state.history = [];
    state.selectedHistoryId = null;
    saveHistory();
    renderHistory();
    renderDetail();
}

function selectHistory(id) {
    state.selectedHistoryId = (state.selectedHistoryId === id) ? null : id;
    renderHistory();
    renderDetail();
}

function renderHistory() {
    const container = document.getElementById('history-container');
    const q = document.getElementById('search-input').value.toLowerCase();

    const filtered = state.history.filter(h => {
        const matchTab    = state.tab === 'ALL' || h.platform === state.tab;
        const matchSearch = (h.author || '').toLowerCase().includes(q)
                         || (h.description || '').toLowerCase().includes(q);
        return matchTab && matchSearch;
    });

    if (!filtered.length) {
        container.innerHTML = `
        <div class="py-20 text-center opacity-60">
            <div class="bg-white/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <i data-lucide="inbox" class="text-gray-400 w-6 h-6"></i>
            </div>
            <p class="text-[#8e80ab] text-xs font-black">Lịch sử trống!</p>
        </div>`;
        lucide.createIcons();
        return;
    }

    container.innerHTML = filtered.map(h => {
        const active = state.selectedHistoryId === h.id
            ? 'border-[#a1c4fd] shadow-[0_4px_15px_rgba(161,196,253,.3)] bg-white'
            : 'border-transparent hover:border-white shadow-sm bg-white/70 hover:bg-white';
        const typeTag = h.type === 'image'
            ? `<span class="text-[8px] font-black bg-pink-50 border border-pink-100 text-pink-400 px-2 py-0.5 rounded-full uppercase">IMG</span>`
            : '';
        return `
        <div onclick="selectHistory('${escHtml(h.id)}')"
             class="${active} p-3.5 rounded-[1.5rem] flex items-center gap-3 border-2 transition-all cursor-pointer group">
            ${h.thumbnail
                ? `<img src="${escHtml(h.thumbnail)}" class="w-12 h-12 rounded-[1rem] object-cover shrink-0 shadow-sm" onerror="this.style.display='none'" alt="thumb"/>`
                : `<div class="avatar-fallback w-12 h-12 rounded-[1rem] text-xs">${escHtml((h.author||'?')[0].toUpperCase())}</div>`}
            <div class="flex-1 min-w-0">
                <p class="text-[11px] font-black text-[#5c4d7d] truncate">@${escHtml(h.author || 'unknown')}</p>
                <p class="text-[10px] text-[#8e80ab] line-clamp-1 font-bold mt-1 leading-tight">${escHtml(h.description || '')}</p>
            </div>
            <div class="flex flex-col items-end gap-1.5 shrink-0 pl-1">
                <span class="text-[8px] font-black bg-gradient-to-r from-blue-50 to-purple-50 border border-white text-purple-500 px-2 py-0.5 rounded-full uppercase">${escHtml(h.platform)}</span>
                ${typeTag}
                <span class="text-[9px] text-gray-400 font-black">${escHtml(h.timestamp || '')}</span>
            </div>
        </div>`;
    }).join('');
    lucide.createIcons();
}

function renderDetail() {
    const panel = document.getElementById('history-detail');
    const item  = state.history.find(h => h.id === state.selectedHistoryId);
    if (!item) { panel.classList.add('hidden'); return; }

    const isImage    = item.type === 'image';
    const imageData  = item.api_data?.image_data || {};
    const noWmList   = imageData.no_watermark_image_list || [];
    const wmList     = imageData.watermark_image_list    || [];
    const allImages  = noWmList.length ? noWmList : wmList;
    const downloadUrl = isImage
        ? (allImages[0] || '')
        : (item.links?.download || item.links?.video || '');
    const musicUrl   = item.music?.play_url?.url_list?.[0] || item.music?.play_url || '';
    const musicName  = item.music?.title || 'Nhạc nền';

    panel.classList.remove('hidden');
    panel.innerHTML = `
    <div class="flex items-center justify-between mb-4 px-1">
        <span class="text-[10px] font-black text-[#a1c4fd] uppercase tracking-widest flex items-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5"></i> Chi tiết
        </span>
        <button onclick="selectHistory(null)" class="p-1.5 bg-white/60 text-gray-400 hover:text-red-400 rounded-full transition-colors hover:bg-white">
            <i data-lucide="x" class="w-3.5 h-3.5 stroke-[3]"></i>
        </button>
    </div>
    <div class="bg-white/80 rounded-[1.5rem] p-4 shadow-sm border-2 border-white overflow-hidden">
        <div class="flex gap-4 mb-4">
            ${item.thumbnail
                ? `<img src="${escHtml(item.thumbnail)}" class="w-20 h-20 rounded-2xl object-cover shrink-0 shadow-sm" alt="thumb"/>`
                : `<div class="avatar-fallback w-20 h-20 rounded-2xl text-lg">${escHtml((item.author||'?')[0].toUpperCase())}</div>`}
            <div class="flex-1 flex flex-col justify-center min-w-0">
                <div class="flex items-center gap-1.5 mb-1">
                    <h4 class="font-black text-xs text-[#5c4d7d] truncate">@${escHtml(item.author || 'unknown')}</h4>
                    <i data-lucide="check-circle-2" class="text-blue-400 w-3 h-3 shrink-0"></i>
                </div>
                <p class="text-[10px] text-[#8e80ab] line-clamp-3 mt-1 leading-relaxed font-bold bg-gray-50/50 rounded-xl p-1.5">${escHtml(item.description || '')}</p>
            </div>
        </div>
        ${isImage && allImages.length ? `
        <p class="text-[9px] font-black text-pink-400 uppercase tracking-widest mb-2">${allImages.length} ảnh</p>
        ${musicUrl ? `
        <div class="bg-purple-50/60 rounded-xl p-2.5 flex items-center gap-2 mb-3 border border-purple-100">
            <i data-lucide="music" class="w-3.5 h-3.5 text-purple-400 shrink-0"></i>
            <span class="text-[10px] font-bold text-purple-600 truncate flex-1">${escHtml(musicName)}</span>
            <button onclick="triggerDownload('${escHtml(musicUrl)}', '${escHtml(musicName)}.mp3')"
                    class="p-1.5 rounded-lg bg-white text-purple-400 hover:bg-purple-50 shrink-0 transition-colors">
                <i data-lucide="download" class="w-3 h-3"></i>
            </button>
        </div>` : ''}
        <button onclick="downloadAllImages(${JSON.stringify(allImages)}, '${escHtml(item.author || 'image')}')"
                class="w-full bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 text-white py-3 rounded-xl font-black text-[11px] flex items-center justify-center gap-2 uppercase tracking-widest transition-colors shadow-md hover:-translate-y-0.5 active:scale-95">
            <i data-lucide="image-down" class="w-3.5 h-3.5"></i> Tải tất cả ${allImages.length} ảnh
        </button>` : downloadUrl ? `
        <div class="space-y-2 mb-4">
            ${linkRow('DOWNLOAD', downloadUrl)}
        </div>
        <button onclick="triggerDownload('${escHtml(downloadUrl)}')"
                class="w-full bg-[#a1c4fd] hover:bg-[#8ab4f8] text-white py-3 rounded-xl font-black text-[11px] flex items-center justify-center gap-2 uppercase tracking-widest transition-colors shadow-[0_4px_10px_rgba(161,196,253,.4)] hover:-translate-y-0.5 active:scale-95">
            <i data-lucide="download" class="w-3.5 h-3.5"></i> Tải Xuống
        </button>` : '<p class="text-xs text-gray-400 text-center font-bold">Không có link tải</p>'}
    </div>`;
    lucide.createIcons();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
lucide.createIcons();
renderHistory();
</script>
</body>
</html>
