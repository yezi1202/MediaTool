<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Downloader 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --kawaii-grid: #ffeed9;
            --text-main: #5c4d7d;
            --text-light: #8e80ab;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fffaf5;
            background-image: 
                linear-gradient(to right, var(--kawaii-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--kawaii-grid) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            cursor: url('https://cdn.custom-cursor.com/db/8549/32/cute-cat-paw-cursor.png'), auto;
        }
        
        a, button, input, textarea, .cursor-pointer {
            cursor: url('https://cdn.custom-cursor.com/db/8548/32/cute-cat-paw-pointer.png'), pointer !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: #fbcfe8; 
            border-radius: 10px; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.15);
        }

        .btn-gradient-pink {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.3);
            color: #fff;
            transition: all 0.2s ease;
        }
        .btn-gradient-pink:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4);
        }
        .btn-gradient-pink:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.3);
        }
        .btn-gradient-pink:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .filter-tag {
            background: rgba(255,255,255,0.7);
            color: var(--text-light);
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .filter-tag:hover { border-color: #fbcfe8; color: #ff85a1; }
        .filter-tag-active {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #5c4d7d;
            box-shadow: 0 4px 15px rgba(161, 196, 253, 0.4);
            border-color: #fff;
        }

        @keyframes float-blob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float-blob 15s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, #f6f7f8 4%, #edeef1 25%, #f6f7f8 36%);
            background-size: 1000px 100%;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2.5s ease-in-out infinite;
        }

        @keyframes wave-hand {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.05); }
        }
        @keyframes tilt-head {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(-10deg) scale(1.05); }
        }
        @keyframes pull-data {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-5px) scale(1.02); }
            50% { transform: translateY(5px) scale(0.98); }
            75% { transform: translateY(-3px) scale(1.01); }
        }
        .dicebear-wave {
            animation: wave-hand 2s ease-in-out infinite;
        }
        .dicebear-tilt {
            animation: tilt-head 2.5s ease-in-out infinite;
        }
        .dicebear-pull {
            animation: pull-data 1.5s ease-in-out infinite;
        }

        textarea::placeholder { color: #d8b4e2; }
        
        .pending-panel {
            display: flex;
            flex-direction: column;
            animation: slideInBottom 0.3s ease-out;
        }
        
        @keyframes slideInBottom {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="relative">

    <div class="h-screen flex flex-col p-4 md:p-6 lg:p-8 max-w-[1600px] mx-auto overflow-hidden relative z-10">
        
        <!-- Background Blobs -->
        <div class="blob bg-pink-200/60 w-[500px] h-[500px] rounded-full top-[-10%] left-[-10%]"></div>
        <div class="blob bg-blue-200/50 w-[600px] h-[600px] rounded-full bottom-[-20%] right-[-10%]" style="animation-delay: -5s"></div>
        <div class="blob bg-purple-200/40 w-[400px] h-[400px] rounded-full top-[30%] right-[20%]" style="animation-delay: -10s"></div>

        <!-- Header -->
        <header class="flex justify-between items-center mb-8 shrink-0 relative z-10 px-2">
            <div class="flex items-center gap-4 group cursor-pointer">
                <div class="p-3.5 bg-white/80 backdrop-blur-md rounded-[1.2rem] shadow-[0_8px_20px_rgba(255,182,193,0.3)] border-2 border-white transform group-hover:-rotate-6 transition-transform duration-300">
                    <i data-lucide="download-cloud" class="text-blue-400 w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black text-[#5c4d7d] tracking-tight">MediaTool<span class="text-[#a1c4fd]">Trip</span></h1>
                    <p class="text-[11px] font-black text-[#8e80ab] uppercase tracking-[0.2em] mt-0.5">Công cụ tải video tốc độ cao ⚡</p>
                </div>
            </div>
            <div id="connection-status" class="flex items-center gap-2 px-4 py-2 bg-white/80 rounded-full border-2 border-white shadow-sm">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-orange-400 animate-pulse"></div>
                <span id="status-text" class="text-xs font-black text-gray-600">Kết nối...</span>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row gap-8 min-h-0 overflow-hidden relative z-10 px-2">
            
            <!-- CỘT TRÁI -->
            <main class="flex-1 flex flex-col min-w-0">
                <section class="mb-6 shrink-0 relative">
                    <div class="glass-card p-6 relative group z-10">
                        <textarea 
                            id="input-text"
                            oninput="updateLinkCount()"
                            placeholder="Dán link video TikTok, Douyin, Facebook... vào đây (Hỗ trợ nhiều link)"
                            class="w-full h-24 p-5 text-purple-700 font-bold bg-white/40 rounded-[1.5rem] focus:outline-none resize-none custom-scroll text-lg border-2 border-white focus:border-[#a1c4fd] transition-all shadow-inner"
                        ></textarea>
                        <div class="flex justify-between items-center mt-4">
                            <div class="flex items-center gap-2 text-[#a599c2] font-black text-[11px] uppercase tracking-widest pl-2">
                                <i data-lucide="link" class="w-4 h-4"></i>
                                <span id="link-count">0 Link sẵn sàng</span>
                            </div>
                            <button 
                                id="btn-parse"
                                onclick="handleParse()"
                                class="bg-[#a1c4fd] hover:bg-[#8ab4f8] text-white shadow-[0_8px_20px_rgba(161,196,253,0.4)] disabled:opacity-50 disabled:cursor-not-allowed px-8 py-3.5 rounded-full font-black flex items-center gap-2 text-md transition-all"
                            >
                                <span id="btn-parse-text">Trích xuất</span> <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </section>

                <section class="flex-1 overflow-y-auto custom-scroll pr-4 pb-12">
                    <div class="flex items-center gap-3 mb-6 px-2">
                        <i data-lucide="layout-grid" class="text-blue-400 w-6 h-6"></i>
                        <h2 class="text-xl font-black text-[#5c4d7d]">Kết quả trích xuất</h2>
                        <span id="results-count" class="hidden bg-white/80 px-3 py-1 rounded-full text-xs font-black text-[#5c4d7d] border border-white shadow-sm ml-auto">0 mục</span>
                    </div>

                    <div id="results-container" class="space-y-6">
                        <!-- Default Empty State -->
                        <div class="h-full flex flex-col items-center justify-center opacity-80 py-10 transition-all">
                            <div class="bg-white/50 p-4 rounded-[2.5rem] shadow-sm mb-4 border-2 border-white dicebear-tilt">
                                <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=sleep&backgroundColor=transparent" class="w-32 h-24 object-cover rounded-xl" alt="empty"/>
                            </div>
                            <h3 class="font-black text-xl text-[#5c4d7d] mb-1">Chưa có dữ liệu!</h3>
                            <p class="font-bold text-[#8e80ab] text-center text-sm">Hệ thống sẽ tự động lấy thông tin giúp bạn<br/>sau khi bạn nhập link.</p>
                        </div>
                    </div>
                </section>
            </main>

            <!-- CỘT PHẢI: LỊCH SỬ -->
            <aside class="hidden lg:flex w-[420px] flex-col shrink-0 pb-4">
                <div class="glass-card p-6 h-full flex flex-col relative overflow-hidden">
                    <div class="flex items-center justify-between mb-6 relative z-10 px-1">
                        <h2 class="font-black text-[#5c4d7d] flex items-center gap-2 text-lg">
                            <i data-lucide="history" class="text-[#a1c4fd] w-5 h-5"></i>
                            Lịch sử trích xuất
                        </h2>
                        <button onclick="clearHistory()" class="text-[10px] font-black text-gray-500 hover:text-red-400 bg-white/60 px-3 py-1.5 rounded-full transition-colors uppercase border border-white">
                            Dọn dẹp 🧹
                        </button>
                    </div>

                    <div class="flex gap-2 mb-6 overflow-x-auto pb-2 shrink-0 relative z-10 px-1 custom-scroll">
                        <button onclick="setTab('ALL')" id="tab-ALL" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag filter-tag-active">TẤT CẢ</button>
                        <button onclick="setTab('DOUYIN')" id="tab-DOUYIN" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">DOUYIN</button>
                        <button onclick="setTab('TIKTOK')" id="tab-TIKTOK" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">TIKTOK</button>
                        <button onclick="setTab('FACEBOOK')" id="tab-FACEBOOK" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest filter-tag">FACEBOOK</button>
                    </div>

                    <div class="relative mb-6 shrink-0 z-10 px-1">
                        <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-purple-300 w-4 h-4"></i>
                        <input 
                            type="text" id="search-input" oninput="renderHistory()"
                            placeholder="Tìm kiếm tác giả, mô tả..."
                            class="w-full bg-white/60 border-2 border-white rounded-[1.2rem] py-3 pl-12 pr-4 text-xs font-bold text-[#5c4d7d] focus:outline-none focus:bg-white transition-all shadow-sm"
                        />
                    </div>

                    <div id="history-container" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2 mb-4 z-10 px-1">
                        <div class="py-20 text-center opacity-60">
                            <div class="bg-white/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                                <i data-lucide="inbox" class="text-gray-400 w-6 h-6"></i>
                            </div>
                            <p class="text-[#8e80ab] text-xs font-black">Lịch sử trống!</p>
                        </div>
                    </div>

                    <!-- CHI TIẾT LỊCH SỬ -->
                    <div id="history-detail" class="hidden shrink-0 border-t-2 border-white/50 pt-5 mt-auto relative z-10 transition-all">
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // Initialize SocketIO
        const socket = io();
        
        // State Management
        let appState = {
            results: [],
            history: JSON.parse(localStorage.getItem('mediaToolHistory') || '[]'),
            tab: 'ALL',
            search: '',
            selectedHistoryId: null,
            isProcessing: false,
            pendingCount: 0,
            completedCount: 0
        };

        // SocketIO Events
        socket.on('connection_response', (data) => {
            console.log('Connected to server:', data);
            updateConnectionStatus(true);
        });

        socket.on('extraction_start', (data) => {
            console.log('Extraction started:', data);
            appState.isProcessing = true;
            appState.pendingCount = data.total;
            appState.completedCount = 0;
            appState.results = [];
            renderResults();
        });

        socket.on('extraction_pending', (data) => {
            console.log('Pending:', data);
            const pendingItem = {
                id: `pending-${data.index}`,
                url: data.url,
                platform: data.platform,
                status: 'loading',
                index: data.index,
                total: data.total
            };
            appState.results.push(pendingItem);
            renderResults();
        });

        socket.on('extraction_result', (data) => {
            console.log('Result received:', data);
            const result = data.result;
            
            // Update pending item to completed
            const index = appState.results.findIndex(r => r.id === `pending-${data.index}`);
            if (index !== -1) {
                appState.results[index] = result;
            }
            
            // Add to history if successful
            if (!result.error) {
                appState.history.unshift(result);
                saveHistoryToLocalStorage();
            }
            
            appState.completedCount++;
            renderResults();
            renderHistory();
        });

        socket.on('extraction_error', (data) => {
            console.error('Extraction error:', data);
            showNotification(data.error, 'error');
            appState.isProcessing = false;
            updateButtonState();
        });

        socket.on('extraction_complete', (data) => {
            console.log('Extraction complete:', data);
            appState.isProcessing = false;
            updateButtonState();
            showNotification('Hoàn thành trích xuất! 🎉', 'success');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            updateConnectionStatus(false);
        });

        // Render Icons
        lucide.createIcons();

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            if (connected) {
                statusDot.className = 'w-3 h-3 rounded-full bg-green-400';
                statusText.textContent = 'Đã kết nối';
            } else {
                statusDot.className = 'w-3 h-3 rounded-full bg-red-400 animate-pulse';
                statusText.textContent = 'Mất kết nối';
            }
        }

        function updateLinkCount() {
            const text = document.getElementById('input-text').value;
            const urls = text.match(/(https?:\/\/[^\s]+)/g) || [];
            document.getElementById('link-count').innerText = `${urls.length} Link sẵn sàng`;
        }

        function updateButtonState() {
            const btn = document.getElementById('btn-parse');
            const btnText = document.getElementById('btn-parse-text');
            
            if (appState.isProcessing) {
                btn.disabled = true;
                btnText.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Đang xử lý...`;
            } else {
                btn.disabled = false;
                btnText.innerHTML = `Trích xuất`;
            }
            lucide.createIcons();
        }

        function handleParse() {
            const inputEl = document.getElementById('input-text');
            const text = inputEl.value;
            const urls = text.match(/(https?:\/\/[^\s]+)/g) || [];
            
            if (urls.length === 0 || appState.isProcessing) return;
            
            appState.isProcessing = true;
            updateButtonState();
            
            // Emit to server
            socket.emit('extract_urls', { urls: urls });
            
            inputEl.value = '';
            updateLinkCount();
        }

        function copyToClipboard(btnElement, text) {
            navigator.clipboard.writeText(text);
            const originalHTML = btnElement.innerHTML;
            const originalClasses = btnElement.className;
            
            btnElement.className = btnElement.className.replace(/bg-[^ ]+/, 'bg-green-400');
            btnElement.innerHTML = `<i data-lucide="check" class="w-3 h-3 md:w-4 md:h-4 stroke-[4]"></i>`;
            lucide.createIcons();

            setTimeout(() => {
                btnElement.className = originalClasses;
                btnElement.innerHTML = originalHTML;
                lucide.createIcons();
            }, 1500);
        }

        function renderResults() {
            const container = document.getElementById('results-container');
            const countLabel = document.getElementById('results-count');
            
            if (appState.results.length > 0) {
                countLabel.classList.remove('hidden');
                countLabel.innerText = `${appState.results.length} mục`;
            } else {
                countLabel.classList.add('hidden');
            }

            let html = '';
            appState.results.forEach(item => {
                if (item.status === 'loading') {
                    html += createLoadingPanel(item);
                } else if (!item.error) {
                    html += createResultPanel(item);
                } else {
                    html += createErrorPanel(item);
                }
            });
            
            if (html === '') {
                container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center opacity-80 py-10 transition-all">
                    <div class="bg-white/50 p-4 rounded-[2.5rem] shadow-sm mb-4 border-2 border-white dicebear-tilt">
                        <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=sleep&backgroundColor=transparent" class="w-32 h-24 object-cover rounded-xl" alt="empty"/>
                    </div>
                    <h3 class="font-black text-xl text-[#5c4d7d] mb-1">Chưa có dữ liệu!</h3>
                    <p class="font-bold text-[#8e80ab] text-center text-sm">Hệ thống sẽ tự động lấy thông tin giúp bạn<br/>sau khi bạn nhập link.</p>
                </div>`;
            } else {
                container.innerHTML = html;
            }
            lucide.createIcons();
        }

        function createLoadingPanel(item) {
            return `
            <div class="glass-card p-5 relative overflow-hidden border-2 border-white pending-panel">
                <div class="flex flex-col md:flex-row gap-6 items-center md:items-start opacity-90">
                    <div class="w-full md:w-52 aspect-square rounded-[2rem] bg-white flex flex-col items-center justify-center shrink-0 border-4 border-blue-50 shadow-sm overflow-hidden relative dicebear-pull">
                        <img src="https://api.dicebear.com/7.x/kawaii/svg?seed=loading&backgroundColor=ffeed9" class="w-full h-full object-cover opacity-90" alt="loading"/>
                        <div class="absolute bottom-2 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-xl border border-gray-100 shadow-sm">
                            <p class="font-black text-[#a1c4fd] text-[10px] uppercase tracking-widest flex items-center gap-1">
                                <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> Đang ráng kéo...
                            </p>
                        </div>
                    </div>
                    <div class="flex-1 w-full space-y-5 py-2">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full shimmer border-2 border-white"></div>
                            <div class="space-y-2"><div class="h-4 w-32 shimmer rounded-full"></div><div class="h-3 w-20 shimmer rounded-full"></div></div>
                        </div>
                        <div class="space-y-2.5">
                            <div class="h-3 w-full shimmer rounded-full"></div>
                            <div class="h-3 w-5/6 shimmer rounded-full"></div>
                        </div>
                        <div class="bg-white/60 p-3 rounded-2xl flex items-center gap-3 border border-white">
                            <div class="p-1.5 bg-blue-100 rounded-lg"><i data-lucide="link" class="text-blue-400 w-3 h-3"></i></div>
                            <p class="text-[11px] font-bold text-[#8e80ab] truncate">${item.url}</p>
                        </div>
                        <div class="w-full bg-blue-100 rounded-full h-2">
                            <div class="bg-[#a1c4fd] h-2 rounded-full w-1/3 animate-pulse"></div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function createErrorPanel(item) {
            return `
            <div class="glass-card p-5 relative overflow-hidden border-2 border-red-200 bg-red-50/40 pending-panel">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-red-100 rounded-full shrink-0">
                        <i data-lucide="alert-circle" class="text-red-500 w-6 h-6"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-black text-red-600 text-sm">Lỗi trích xuất</p>
                        <p class="text-[11px] text-red-500 mt-1">${item.error || 'Đã xảy ra lỗi không xác định'}</p>
                        <p class="text-[10px] text-gray-600 mt-2 truncate">${item.url}</p>
                    </div>
                </div>
            </div>`;
        }

        function createResultPanel(item) {
            const hasThumbnail = item?.thumbnail && item?.thumbnail?.url_list[0] !== '';
            const imageHtml = hasThumbnail ? 
                `<img src="${item.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out" />` :
                `<div class="w-full h-full bg-gradient-to-br from-blue-100 to-purple-100 flex items-center justify-center"><i data-lucide="image" class="text-gray-400 w-12 h-12"></i></div>`;

            return `
            <div class="glass-card p-6 md:p-7 flex flex-col xl:flex-row gap-8 relative group hover:border-blue-100 transition-colors pending-panel">
                <div class="w-full xl:w-60 aspect-square rounded-[2rem] overflow-hidden relative shadow-[0_8px_20px_rgba(0,0,0,0.06)] shrink-0 bg-white border-4 border-white group-hover:shadow-[0_8px_30px_rgba(161,196,253,0.3)] transition-all">
                    ${imageHtml}
                    <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md text-[#5c4d7d] text-[9px] px-3 py-1.5 rounded-xl font-black tracking-[0.15em] uppercase shadow-sm">
                        ${item.platform}
                    </div>
                </div>
                <div class="flex-1 min-w-0 space-y-5 flex flex-col justify-center">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-[1.2rem] border-2 border-white shadow-sm bg-blue-50 flex items-center justify-center font-black text-[#a1c4fd]">
                                ${item.author.substring(0, 1).toUpperCase()}
                            </div>
                            <div>
                                <div class="flex items-center gap-1.5">
                                    <h3 class="font-black text-lg text-[#5c4d7d]">@${item.author}</h3>
                                    <i data-lucide="check-circle-2" class="text-blue-400 w-4 h-4"></i>
                                </div>
                                <button class="text-[9px] font-black text-gray-500 hover:text-blue-400 transition-colors flex items-center gap-1 uppercase tracking-widest mt-0.5">
                                    <i data-lucide="user" class="w-3 h-3"></i> Xem
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[8px] font-black text-[#8e80ab] uppercase tracking-widest">Thời gian</span>
                            <span class="text-[11px] font-black text-[#a1c4fd]">${item.timestamp}</span>
                        </div>
                    </div>
                    <div class="bg-white/50 p-4 rounded-[1.5rem] relative">
                        <p class="text-[13px] font-bold text-[#5c4d7d] leading-relaxed line-clamp-2" id="desc-${item.id}">${item.description}</p>
                        <button onclick="document.getElementById('desc-${item.id}').classList.toggle('line-clamp-2')" class="text-blue-400 text-[10px] font-black mt-2 flex items-center gap-1 hover:text-[#5c4d7d] transition-colors uppercase tracking-widest">
                            Đọc thêm <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <div class="space-y-2.5">
                        ${createLinkRow('DOWNLOAD URL', item.links.download)}
                    </div>
                    <button onclick="window.open('${item.links.download}')" class="w-full bg-[#a1c4fd] hover:bg-[#8ab4f8] py-4 rounded-full font-black text-sm text-white shadow-md flex items-center justify-center gap-2 mt-2 uppercase tracking-widest transition-all hover:-translate-y-0.5">
                        <i data-lucide="download" class="w-4 h-4 stroke-[3]"></i> Tải Video
                    </button>
                </div>
            </div>`;
        }

        function createLinkRow(label, value) {
            return `
            <div class="flex items-center justify-between bg-white/70 p-2.5 rounded-2xl border-2 border-white shadow-sm hover:border-blue-100 transition-colors">
                <div class="flex flex-col min-w-0 flex-1 pl-2">
                    <span class="text-[8px] font-black text-[#a1c4fd] uppercase tracking-[0.2em]">${label}</span>
                    <p class="text-[12px] font-bold text-[#5c4d7d] truncate mt-0.5">${value}</p>
                </div>
                <button onclick="copyToClipboard(this, '${value}')" class="p-2.5 rounded-xl transition-all border-2 bg-white border-transparent text-[#8e80ab] hover:bg-blue-50 hover:text-blue-400 shadow-sm">
                    <i data-lucide="copy" class="w-4 h-4 stroke-[3]"></i>
                </button>
            </div>`;
        }

        function setTab(tabName) {
            appState.tab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('filter-tag-active'));
            document.getElementById(`tab-${tabName}`).classList.add('filter-tag-active');
            appState.selectedHistoryId = null;
            renderHistory();
            renderDetail();
        }

        function clearHistory() {
            if (confirm('Bạn chắc chắn muốn xóa toàn bộ lịch sử?')) {
                appState.history = [];
                saveHistoryToLocalStorage();
                appState.selectedHistoryId = null;
                renderHistory();
                renderDetail();
            }
        }

        function selectHistory(id) {
            appState.selectedHistoryId = (appState.selectedHistoryId === id) ? null : id;
            renderHistory();
            renderDetail();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const searchValue = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = appState.history.filter(item => {
                const matchTab = appState.tab === 'ALL' || item.platform === appState.tab;
                const matchSearch = item.author.toLowerCase().includes(searchValue) || item.description.toLowerCase().includes(searchValue);
                return matchTab && matchSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                <div class="py-20 text-center opacity-60">
                    <div class="bg-white/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i data-lucide="inbox" class="text-gray-400 w-6 h-6"></i>
                    </div>
                    <p class="text-[#8e80ab] text-xs font-black">Lịch sử trống!</p>
                </div>`;
                lucide.createIcons();
                return;
            }

            let html = '';
            filtered.forEach(h => {
                const isSelected = appState.selectedHistoryId === h.id;
                const activeClass = isSelected ? 'border-[#a1c4fd] shadow-[0_4px_15px_rgba(161,196,253,0.3)] bg-white' : 'border-transparent hover:border-white shadow-sm bg-white/70 hover:bg-white';
                
                html += `
                <div onclick="selectHistory('${h.id}')" class="${activeClass} p-3.5 rounded-[1.5rem] flex items-center gap-3 border-2 transition-all cursor-pointer group">
                    <div class="w-12 h-12 rounded-[1rem] overflow-hidden shrink-0 relative shadow-sm bg-blue-50 flex items-center justify-center font-black text-[#a1c4fd] text-xs">
                        ${h.author.substring(0, 1).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[11px] font-black text-[#5c4d7d] truncate">@${h.author}</p>
                        <p class="text-[10px] text-[#8e80ab] line-clamp-1 font-bold mt-1 leading-tight">${h.description}</p>
                    </div>
                    <div class="flex flex-col items-end gap-1.5 shrink-0 pl-1">
                        <span class="text-[8px] font-black bg-gradient-to-r from-blue-50 to-purple-50 border border-white text-purple-500 px-2 py-0.5 rounded-full uppercase">${h.platform}</span>
                        <span class="text-[9px] text-gray-400 font-black">${h.timestamp}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderDetail() {
            const detailPanel = document.getElementById('history-detail');
            const item = appState.history.find(h => h.id === appState.selectedHistoryId);
            
            if (!item) {
                detailPanel.classList.add('hidden');
                return;
            }

            detailPanel.classList.remove('hidden');
            detailPanel.innerHTML = `
                <div class="flex items-center justify-between mb-4 px-1">
                    <span class="text-[10px] font-black text-[#a1c4fd] uppercase tracking-widest flex items-center gap-1.5">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i> Chi tiết
                    </span>
                    <button onclick="selectHistory(null)" class="p-1.5 bg-white/60 text-gray-400 hover:text-red-400 rounded-full transition-colors hover:bg-white">
                        <i data-lucide="x" class="w-3.5 h-3.5 stroke-[3]"></i>
                    </button>
                </div>
                <div class="bg-white/80 rounded-[1.5rem] p-4 shadow-sm border-2 border-white overflow-hidden relative">
                    <div class="flex gap-4 mb-4">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 shadow-sm relative bg-blue-50 flex items-center justify-center font-black text-[#a1c4fd]">
                            ${item.author.substring(0, 1).toUpperCase()}
                        </div>
                        <div class="flex-1 flex flex-col justify-center min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                <h4 class="font-black text-xs text-[#5c4d7d] truncate">@${item.author}</h4>
                                <i data-lucide="check-circle-2" class="text-blue-400 w-3 h-3 shrink-0"></i>
                            </div>
                            <p class="text-[10px] text-[#8e80ab] line-clamp-3 mt-1 leading-relaxed font-bold bg-gray-50/50 rounded-xl p-1.5">${item.description}</p>
                        </div>
                    </div>
                    <div class="space-y-2 mb-4">
                        ${createLinkRow('DOWNLOAD', item.links.download)}
                    </div>
                    <button onclick="window.open('${item.links.download}')" class="w-full bg-[#a1c4fd] hover:bg-[#8ab4f8] text-white py-3 rounded-xl font-black text-[11px] flex items-center justify-center gap-2 uppercase tracking-widest transition-colors shadow-[0_4px_10px_rgba(161,196,253,0.4)] hover:-translate-y-0.5">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Tải Lại
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function saveHistoryToLocalStorage() {
            localStorage.setItem('mediaToolHistory', JSON.stringify(appState.history));
        }

        function showNotification(message, type = 'info') {
            // TODO: Implement notification system
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // Load history on startup
        renderHistory();
    </script>
</body>
</html>
